# Chernobyl Relay Chat – CI/CD Pipeline
#
# Build strategy:
#
#   build-net8  (master + dotnet-uplift)
#     Targets .NET 8 using the dotnet CLI.
#     Publishes self-contained binaries for linux-x64 and win-x64.

name: .NET Zone Deployment Pipeline

on:
  push:
    branches: [ "master", "dotnet-uplift" ]
  pull_request:
    branches: [ "master" ]

env:
  SOLUTION_NAME:      "Chernobyl Relay Chat.sln"
  PROJECT_PATH:       "Chernobyl Relay Chat/Chernobyl Relay Chat.csproj"
  PROJECT_DIRECTORY:  "Chernobyl Relay Chat"

# ---------------------------------------------------------------------------
# JOB 1 – .NET 8 multi-platform  (Avalonia, Linux + Windows)
# ---------------------------------------------------------------------------
jobs:
  build-net8:
    name: Build (.NET 8 · ${{ matrix.os }} · ${{ matrix.configuration }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        configuration: [Debug, Release]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clear NuGet cache
        run: dotnet nuget locals all --clear

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLUTION_NAME }}"

      - name: Build (${{ matrix.configuration }})
        run: dotnet build "${{ env.SOLUTION_NAME }}" --no-restore --configuration ${{ matrix.configuration }}

      - name: Execute unit tests
        run: dotnet test --no-build --configuration ${{ matrix.configuration }}
        continue-on-error: true

      - name: .NET vulnerability audit
        run: dotnet list "${{ env.PROJECT_DIRECTORY }}" package --vulnerable --include-transitive
        continue-on-error: true

      - name: Microsoft Security DevOps
        uses: microsoft/security-devops-action@v1.12.0
        id: msdo
        continue-on-error: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL
        continue-on-error: true

      - name: Publish Linux (linux-x64)
        if: matrix.os == 'ubuntu-latest'
        run: dotnet publish "${{ env.PROJECT_PATH }}" -r linux-x64 --self-contained true -p:PublishSingleFile=true --configuration ${{ matrix.configuration }} -o ./publish/linux-x64

      - name: Copy gamedata (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: cp -r gamedata ./publish/linux-x64/gamedata

      - name: Publish Windows (win-x64)
        if: matrix.os == 'windows-latest'
        run: dotnet publish "${{ env.PROJECT_PATH }}" -r win-x64 --self-contained true -p:PublishSingleFile=true --configuration ${{ matrix.configuration }} -o ./publish/win-x64

      - name: Copy gamedata (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp -r gamedata ./publish/win-x64/gamedata

      - name: Publish macOS (osx-arm64)
        if: matrix.os == 'macos-latest'
        run: dotnet publish "${{ env.PROJECT_PATH }}" -r osx-arm64 --self-contained true -p:PublishSingleFile=true --configuration ${{ matrix.configuration }} -o ./publish/osx-arm64

      - name: Copy gamedata (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: cp -r gamedata ./publish/osx-arm64/gamedata

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest' && matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: cocrc-net8-linux-x64-${{ matrix.configuration }}
          path: ./publish/linux-x64/

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest' && matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: cocrc-net8-win-x64-${{ matrix.configuration }}
          path: ./publish/win-x64/

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest' && matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: cocrc-net8-osx-arm64-${{ matrix.configuration }}
          path: ./publish/osx-arm64/
